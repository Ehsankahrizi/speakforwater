name: Reset queue (renumber + re-queue published)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET to confirm — this will renumber every row and re-queue all published episodes.'
        required: true
        default: ''

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "RESET" ]; then
            echo "::error::Input did not match 'RESET'. Aborting."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Run reset_queue.py
        run: python scripts/reset_queue.py
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
