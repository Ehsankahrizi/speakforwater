name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Re-deploy automatically once Generate Podcast finishes — even when the
  # bot pushes commits using GITHUB_TOKEN (which by design does NOT trigger
  # the push event again, to prevent infinite loops).
  workflow_run:
    workflows: ["Generate Podcast"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Copy episodes folder + RSS into dist
        run: |
          if [ -d "public/episodes" ]; then
            mkdir -p dist/episodes
            cp -r public/episodes/. dist/episodes/ 2>/dev/null || true
          fi
          if [ -f "public/podcast.xml" ]; then
            cp public/podcast.xml dist/podcast.xml
          fi
          if [ -f "public/ep000.m4a" ]; then
            cp public/ep000.m4a dist/ep000.m4a
          fi
          if [ -f "public/movie_1.mp4" ]; then
            cp public/movie_1.mp4 dist/movie_1.mp4
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
